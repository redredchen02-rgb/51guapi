name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 脱敏强制门:fail-fast 在任何 build/artifact 之前。从 repo 根调用脚本
      # (脚本内 FIXTURE_DIR 已锚定到自身位置,空扫会 exit 2 大声失败)。
      - name: Check fixture secrets
        run: bash scripts/check-fixture-secrets.sh

      - name: Dependency audit (prod)
        run: pnpm audit --prod --audit-level=high
      - name: Dependency audit (dev warning)
        run: pnpm audit --audit-level=high || echo "::warning::dev 依赖存在高/严重漏洞，请关注"

      # pnpm -r compile 拓撲序：先 shared(tsc → 產出 dist/)，再 backend/extension(tsc --noEmit)。
      # 無需獨立 Build shared 步驟，消除重複 tsc（O4b）。
      - name: Type check
        run: pnpm -r compile

      - name: Lint
        run: pnpm lint:ci

      # Test + 覆盖率门(A2 修复):`pnpm coverage` = 各包 `vitest run --coverage`,跑全部
      # 测试并求值 vitest thresholds(shared 20 / backend 80);低于地板即红。此前 CI 只跑
      # `pnpm -r test`(无 --coverage),thresholds 从不求值 = 装饰性假绿门。
      - name: Test + coverage gate
        run: pnpm coverage

      # 产物校验:build 双端并断言产物存在,消除「CI 绿但产物坏」。
      # 复用 scripts/check-all.sh 的产物校验尾段思路(不整段调它以免重复 lint/test)。
      - name: Build and verify artifacts
        run: |
          pnpm --filter 51guapi-backend build
          pnpm --filter 51guapi-extension build
          # 断言关键产物文件存在(非仅目录),避免空/坏 build 通过 test -d。
          test -f packages/extension/.output/chrome-mv3/manifest.json \
            || { echo "✗ 扩展产物缺 chrome-mv3/manifest.json(build 可能空/坏)"; exit 1; }
          ls packages/backend/dist/*.js >/dev/null 2>&1 \
            || { echo "✗ 后端产物 dist 无 .js(build 可能空/坏)"; exit 1; }
          echo "✓ 双端产物存在且含关键文件"

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # 无条件强制密钥扫描:不依赖任何 clone 端 hook 配置(postinstall 设的 core.hooksPath
  # 只在 pnpm install 后生效,bare clone/CI 不覆盖)。fetch-depth:0 拉全史,使 gitleaks
  # 既扫本次变更也覆盖历史(清史后一次性确认旧 key 已除)。失败即 fail pipeline。
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 直接跑 gitleaks 二进制(非 action wrapper):wrapper 在某些 commit range 下
      # 因 git 向 stderr 输出(如 dubious ownership 警告)误判「stderr is not empty」失败,
      # 即便扫描零泄密。直接 detect 全史,失败即 fail pipeline。
      - name: gitleaks (binary)
        run: |
          VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          ./gitleaks detect --source . --redact -v --exit-code 1
