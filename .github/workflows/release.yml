name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 脱敏强制门:与 CI 同闸,fail-fast 在任何 build/artifact 之前。tag 发布路径
      # 此前绕过此闸(PR 必过、tag 却不过)是 fail-open,此处补齐。
      - name: Check fixture secrets
        run: bash scripts/check-fixture-secrets.sh

      - name: Build shared
        run: pnpm --filter @51guapi/shared build

      - name: Type check
        run: pnpm -r compile

      - name: Lint
        run: pnpm lint:ci

      - name: Test
        run: pnpm -r test

      - name: Build extension zip
        run: pnpm --filter 51guapi-extension zip

      - name: Prepare extension artifact
        run: cp packages/extension/.output/51guapi-extension-*.zip ./extension.zip

      # backend Docker 打包延后到 v0.2:runtime 阶段 npm install 不认 workspace: 协议,
      # 需改 pnpm deploy / 复制 prod node_modules,在可本地验证的环境下再处理。
      # 见 docs/v0.2-backlog.md。v0.1 release 产物为扩展 zip。

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension.zip
          if-no-files-found: error

  # 无条件强制密钥扫描:与 CI 同闸。tag 发布此前完全绕过 gitleaks(PR 必过、tag 却不过)
  # 是 fail-open。fetch-depth:0 拉全史,既扫本次 tag 也覆盖历史。失败即阻断 Release。
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 直接跑 gitleaks 二进制(非 action wrapper):wrapper 在某些 commit range 下因
      # git 向 stderr 输出(如 dubious ownership)误判失败,即便零泄密。直接 detect 全史。
      - name: gitleaks (binary)
        run: |
          VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          ./gitleaks detect --source . --redact -v --exit-code 1

  release:
    needs: [build-and-verify, gitleaks]
    runs-on: ubuntu-latest
    steps:
      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.zip
