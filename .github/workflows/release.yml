name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @51guapi/shared build

      - name: Type check
        run: pnpm -r compile

      - name: Lint
        run: pnpm lint:ci

      - name: Test
        run: pnpm -r test

      - name: Build extension zip
        run: pnpm --filter publisher-fill-assistant zip

      - name: Prepare extension artifact
        run: cp packages/extension/.output/publisher-fill-assistant-*.zip ./extension.zip

      # backend Docker 打包延后到 v0.2:runtime 阶段 npm install 不认 workspace: 协议,
      # 需改 pnpm deploy / 复制 prod node_modules,在可本地验证的环境下再处理。
      # 见 docs/v0.2-backlog.md。v0.1 release 产物为扩展 zip。

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension.zip
          if-no-files-found: error

  release:
    needs: build-and-verify
    runs-on: ubuntu-latest
    steps:
      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.zip
